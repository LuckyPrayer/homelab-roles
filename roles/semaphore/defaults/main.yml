---
# Semaphore Role Default Variables

# Enable/disable Semaphore deployment
semaphore_enabled: true

# Semaphore version
semaphore_version: "v2.10.22"
semaphore_image: "semaphoreui/semaphore:{{ semaphore_version }}"

# Directory configuration
semaphore_base_dir: /opt/infrastructure/semaphore
semaphore_data_dir: "{{ semaphore_base_dir }}/data"

# Network configuration
semaphore_port: 3100                    # Host-mapped port
semaphore_container_port: 3000          # Internal container port
semaphore_container_name: semaphore
semaphore_hostname: "semaphore.{{ env }}.{{ base_domain }}"
semaphore_external_url: "https://{{ semaphore_hostname }}"

# Database configuration (BoltDB - file-based, no external DB required)
semaphore_db_dialect: bolt
semaphore_db_path: /data/database.boltdb

# Admin user configuration
semaphore_admin_user: admin
semaphore_admin_name: Admin
semaphore_admin_email: "admin@{{ base_domain }}"

# Container user for data directory ownership
# Semaphore runs as uid=1001(semaphore) gid=0(root) inside the container
semaphore_uid: 1001
semaphore_gid: 0

# Traefik integration
semaphore_traefik_enabled: true
semaphore_traefik_certresolver: "mytls"

# Health check configuration
semaphore_healthcheck_interval: 30s
semaphore_healthcheck_timeout: 5s
semaphore_healthcheck_retries: 5
semaphore_healthcheck_start_period: 15s

# Infisical configuration for Semaphore secrets
semaphore_infisical_path: "/services/semaphore"
semaphore_infisical_env: "{{ infisical_env_slug }}"

# Backup configuration
semaphore_backup_enabled: true
semaphore_stop_during_backup: true

# =============================================================================
# Project Configuration (API-driven setup after deployment)
# =============================================================================
semaphore_configure: true

# Project
semaphore_project_name: "Homelab"

# Git repository Semaphore will clone to run playbooks
semaphore_repo_name: "homelab"
semaphore_repo_url: "https://github.com/LuckyPrayer/homelab.git"
semaphore_repo_branch: "main"

# Access key names
semaphore_ssh_key_name: "ansible-ssh"
semaphore_git_key_name: "git-https"
semaphore_ssh_user: "semaphore-svc"

# Git authentication type: "login_password" (HTTPS token) or "ssh"
semaphore_git_key_type: "login_password"

# Inventory definitions (file-based, paths relative to repo root)
semaphore_inventories:
  - name: "dev"
    inventory_path: "inventories/dev/hosts.yml"
  - name: "prod"
    inventory_path: "inventories/prod/hosts.yml"

# Environment configuration for Semaphore task runs
semaphore_env_name: "default"
semaphore_env_vars: {}

# Views for organising templates in the Semaphore dashboard
semaphore_views:
  - "App Deployments"
  - "Infrastructure"

# Task templates - defines playbooks that Semaphore can run
# Each template maps to a host-targeted app deployment
semaphore_task_templates:
  - name: "Deploy Apps - All Hosts"
    playbook: "playbooks/semaphore/deploy-apps.yml"
    inventory: "{{ env }}"
    description: "Deploy all homelab apps to all application hosts"
    view: "App Deployments"
  - name: "Deploy Apps - orion-{{ env }}"
    playbook: "playbooks/semaphore/deploy-apps.yml"
    inventory: "{{ env }}"
    arguments: '["--limit", "orion-{{ env }}"]'
    description: "Deploy homelab apps to orion-{{ env }}"
    view: "App Deployments"

# Whether deploy-all should orchestrate apps via Semaphore instead of directly
semaphore_orchestrate_apps: false
